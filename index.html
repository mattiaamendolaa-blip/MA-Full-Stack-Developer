<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mattia Amendola — Full Stack Developer</title>
  <link rel="icon" type="image/png" href="logo.png">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #F7F5F0;
      --card: #FFFFFF;
      --text-primary: #1A1A18;
      --text-secondary: #6B6B67;
      --text-muted: #9E9E9A;
      --accent: #1A1A18;
      --border: rgba(26,26,24,0.10);
      --border-hover: rgba(26,26,24,0.25);
      --tag-bg: #F0EDE6;
      --tag-text: #4A4A46;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #131312;
        --card: #1E1E1C;
        --text-primary: #F0EDE6;
        --text-secondary: #9E9E9A;
        --text-muted: #6B6B67;
        --accent: #F0EDE6;
        --border: rgba(240,237,230,0.10);
        --border-hover: rgba(240,237,230,0.28);
        --tag-bg: #2A2A28;
        --tag-text: #B0ADA6;
      }
    }

    body {
      font-family: 'DM Mono', monospace;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
    }

    .card {
      background: var(--card);
      border: 0.5px solid var(--border);
      border-radius: 20px;
      padding: 40px 32px 32px;
      width: 100%;
      max-width: 360px;
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: var(--text-primary);
    }

    .avatar-wrap {
      display: flex;
      align-items: flex-start;
      gap: 16px;
      margin-bottom: 28px;
    }

    .avatar {
      width: 52px;
      height: 52px;
      border-radius: 14px;
      flex-shrink: 0;
      overflow: hidden; 
      background: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover; 
      display: block;
    }

    .name-block {
      padding-top: 2px;
    }

    .name {
      font-family: 'DM Serif Display', serif;
      font-size: 22px;
      color: var(--text-primary);
      line-height: 1.15;
      letter-spacing: -0.3px;
    }

    .role {
      font-size: 11px;
      font-weight: 400;
      color: var(--text-muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-top: 4px;
    }

    .divider {
      border: none;
      border-top: 0.5px solid var(--border);
      margin: 0 0 24px;
    }

    .links {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .link-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      border: 0.5px solid var(--border);
      border-radius: 12px;
      text-decoration: none;
      color: var(--text-primary);
      transition: border-color 0.18s, background 0.18s;
      cursor: pointer;
    }

    .link-item:hover {
      border-color: var(--border-hover);
      background: var(--tag-bg);
    }

    .link-icon {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      background: var(--tag-bg);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .link-icon svg {
      width: 16px;
      height: 16px;
    }

    .link-text {
      flex: 1;
      min-width: 0;
    }

    .link-label {
      font-size: 12px;
      font-weight: 500;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      display: block;
      margin-bottom: 1px;
    }

    .link-value {
      font-size: 13px;
      color: var(--text-primary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      display: block;
    }

    .link-arrow {
      color: var(--text-muted);
      font-size: 14px;
      flex-shrink: 0;
    }

    .vcf-btn {
      margin-top: 16px;
      width: 100%;
      padding: 14px;
      background: var(--text-primary);
      color: var(--card);
      border: none;
      border-radius: 12px;
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: opacity 0.18s;
      text-decoration: none;
    }

    .vcf-btn:hover { opacity: 0.82; }

    .footer {
      text-align: center;
      margin-top: 20px;
      font-size: 11px;
      color: var(--text-muted);
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>

  <script>
    function downloadVCF(e) {
      e.preventDefault();
      const vcf = [
        'BEGIN:VCARD',
        'VERSION:3.0',
        'FN:Mattia Amendola',
        'N:Amendola;Mattia;;;',
        'TITLE:Full Stack Developer',
        'EMAIL;TYPE=INTERNET:mattiaa.mendolaa@gmail.com',
        'URL;TYPE=Portfolio:https://ma-portfolio-flame.vercel.app/',
        'URL;TYPE=LinkedIn:https://www.linkedin.com/in/mattia-amendola-726713307/',
        'URL;TYPE=GitHub:https://github.com/mattiaamendolaa-blip',
        'END:VCARD'
      ].join('\r\n');

      const blob = new Blob([vcf], { type: 'text/vcard;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'mattia-amendola.vcf';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }
  </script>
